<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Document</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
	<link
		href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
		rel="stylesheet" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_right_alt" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
	<link rel="stylesheet" href="css/style.css" />
	<link rel="stylesheet" href="css/media.css" />
</head>

<body>
    	
    <!-- Login Form Section -->
	<section class="login-form-sec">
		<div class="container">
            <div class="back-box">
                    <a href="index.html" class="back-btn">
                        <span><i class="fa-solid fa-arrow-left"></i></span>
                        Home</a>
                </div>
            <div class="form-container">
                <div class="row">
                <div class="form-img col-md-6">
                    <img src="./img/srvc_head1.jpg" alt=""/>
                </div>
                <div class="login-form-bx col-md-6">
                    <h6>Login</h6>
                    <div class="login-form-container">
                        <form action="#">
                            <div class="login-field-bx mb-4">
                                <input type="text" class="input-field" placeholder="Enter Email"/>
                            </div>
                            <div class="login-field-bx password-bx">
                                <input type="password" class="input-field input-field-psw" placeholder="Enter Password"/>
                                <div class="hide-password">
                                    <span class="hide-eye">
                                        <i class="fa-solid fa-eye-slash close-eye"></i>
                                    </span>
                                    <span class="show-eye">
                                        <i class="fa-regular fa-eye open-eye"></i>
                                    </span>
                                </div>
                            </div>
                            <button class="login-btn mb-4 mt-5" >Sign in</button>
                            <p>Don't have an account? <a href="signup.html" class="signin-link"> Sign up </a></p>
                        </form>
                    </div>
                </div>
                </div>
            </div>
		</div>
	</section>
    

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
	<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
	<script src="js/script.js"></script>


</body>

</html>
